<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, sans-serif; width: 300px; padding: 14px; margin: 0; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  button { width: 100%; padding: 10px; font-size: 14px; border: 0; border-radius: 6px; cursor: pointer; margin-bottom: 6px; }
  .primary { background: #2563eb; color: #fff; }
  .secondary { background: #e5e7eb; color: #111; }
  .status { font-size: 12px; color: #444; min-height: 32px; margin-top: 6px; white-space: pre-wrap; }
  .ok { color: #065f46; }
  .err { color: #991b1b; }
</style>
</head>
<body>
  <h1>Job Hunt Pro — Autofill</h1>
  <button id="fill" class="primary">Fill This Application</button>
  <button id="mark" class="secondary">I Submitted — Mark Applied</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
